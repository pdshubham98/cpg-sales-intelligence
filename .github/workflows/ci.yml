name: CI

on:
  push:
    branches: [main, dev_branch]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ tests/ ui/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      DB_PATH: ":memory:"
      LLM_PROVIDER: groq
      GROQ_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cpg-sales-intelligence:ci .

      - name: Smoke test — health endpoint
        run: |
          docker run -d --name cpg_ci \
            -e LLM_PROVIDER=groq \
            -e GROQ_API_KEY=test-key \
            -p 8000:8000 \
            cpg-sales-intelligence:ci

          echo "Waiting for service to start..."
          sleep 15

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] || (docker logs cpg_ci && exit 1)

          docker stop cpg_ci && docker rm cpg_ci
